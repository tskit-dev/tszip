name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:

  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v18
    with:
      cli-test-cmd: tszip --help


  test:
    name: Python
    # This first-party tskit-dev reusable workflow consumes
    # secrets.CODECOV_TOKEN without declaring it as a named workflow_call
    # secret, so `secrets: inherit` is required for it to work.
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      coverage-directory: tszip
    secrets: inherit
    strategy:
      matrix:
        python: [ 3.11, 3.14 ]
        os:  [ macos-latest, ubuntu-24.04, windows-latest ]
